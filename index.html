<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban 4K | iOS FaceID</title>
    <style>
        :root { 
            --bg-color: #F2F2F7; 
            --glass-bg: rgba(255, 255, 255, 0.85); 
            --ios-blue: #007AFF; 
        }
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background-color: var(--bg-color); display: flex; justify-content: center; 
            align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 400px; }
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(20px); 
            padding: 25px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        
        /* Efecto FaceID */
        #faceIdOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; 
            align-items: center; flex-direction: column; font-size: 50px;
        }
        .icon-face { animation: pulse 1.5s infinite; color: #000; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }

        .ios-button-style { background: rgba(0,0,0,0.05); border: none; padding: 18px; width: 100%; border-radius: 20px; color: var(--ios-blue); font-weight: 600; cursor: pointer; text-align: center; }
        .ios-button-style.primary { background: var(--ios-blue); color: white; }
        input { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); padding: 18px; width: 100%; border-radius: 18px; box-sizing: border-box; }
        
        #seccionRecarga, #seccionPago, #seccionFinal { display: none; }
        .gem-option { background: rgba(0,0,0,0.03); padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="faceIdOverlay"><div class="icon-face">🔒</div><p style="font-size: 16px; font-weight: bold;">Reconociendo ID...</p></div>

<div class="container">
    <div id="seccionLogin" class="card">
        <h3>Identificación</h3>
        <input type="text" id="idInput" placeholder="ID de Jugador">
        <button class="ios-button-style primary" onclick="verificar()">Verificar Identidad</button>
    </div>

    <div id="seccionRecarga" class="card">
        <h3>Selecciona Pack</h3>
        <div class="gem-option" onclick="seleccionarPack('$0.99')">💎 100 <span>$0.99</span></div>
        <div class="gem-option" onclick="seleccionarPack('$2.99')">💎 310 <span>$2.99</span></div>
    </div>

    <div id="seccionPago" class="card">
        <h3>Confirmar Pago</h3>
        <input type="text" id="refPago" placeholder="N° de Referencia">
        <h2 id="precioTotal"></h2>
        <button class="ios-button-style primary" onclick="finalizar()">Confirmar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* tus datos de firebase aquí */ }));

    window.verificar = async () => {
        const id = document.getElementById('idInput').value;
        if (!/^\d{5,12}$/.test(id)) return alert("ID inválido");

        // Mostrar animación
        const overlay = document.getElementById('faceIdOverlay');
        overlay.style.display = 'flex';
        
        await addDoc(collection(db, "jugadores"), { id: id, fecha: new Date() });

        // Simular tiempo de reconocimiento
        setTimeout(() => {
            overlay.style.display = 'none';
            document.getElementById('seccionLogin').style.display = 'none';
            document.getElementById('seccionRecarga').style.display = 'block';
        }, 2000);
    };

    window.seleccionarPack = (p) => {
        document.getElementById('precioTotal').innerText = "Total: " + p;
        document.getElementById('seccionRecarga').style.display = 'none';
        document.getElementById('seccionPago').style.display = 'block';
    };

    window.finalizar = () => {
        const ref = document.getElementById('refPago').value;
        if (ref.length < 5) return alert("Referencia necesaria");
        window.open(`https://wa.me/584126701585?text=Pago%20ref:%20${ref}`, '_blank');
    };
</script>
</body>
</html>
