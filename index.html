<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban 4K | iOS Light Pro</title>
    <style>
        :root { 
            --bg-color: #F2F2F7;
            --glass-bg: rgba(255, 255, 255, 0.75); /* Un poco más transparente para ver las partículas detrás */
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --text-main: #000000;
            --text-secondary: #8E8E93;
        }
        
        * {
            box-sizing: border-box;
            transition: background-color 0.2s, transform 0.1s;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* Evita barras de desplazamiento por culpa de las partículas */
            position: relative;
        }

        /* CONTENEDOR DE PARTÍCULAS */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none; /* Permite hacer clic a través de ellas */
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            filter: blur(1px); /* Suaviza los bordes para estilo iOS */
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) translateX(50px) scale(1.2);
                opacity: 0;
            }
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            position: relative;
            z-index: 1; /* Posiciona la app por encima de las partículas */
        }

        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px); /* Aumentado para un look premium sobre las partículas */
            -webkit-backdrop-filter: blur(25px); 
            padding: 25px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: none;
        }
        
        .card.active {
            display: block;
            animation: iosSlide 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        h3 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .ios-button-style { 
            background: rgba(0, 0, 0, 0.05); 
            border: none;
            padding: 16px; 
            width: 100%; 
            border-radius: 16px; 
            color: var(--ios-blue); 
            font-weight: 600; 
            font-size: 17px;
            cursor: pointer;
            margin-top: 12px;
            text-align: center;
        }
        
        .ios-button-style:active { 
            transform: scale(0.96); 
            opacity: 0.8; 
        }
        
        .ios-button-style.primary { 
            background: var(--ios-blue); 
            color: white; 
        }

        .ios-button-style.danger { 
            color: var(--ios-red); 
        }

        input { 
            background: rgba(0,0,0,0.04); 
            border: 2px solid transparent;
            padding: 16px; 
            width: 100%; 
            border-radius: 16px; 
            color: var(--text-main); 
            font-size: 16px;
            margin-bottom: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--ios-blue);
            background: #ffffff;
        }
        
        .gem-option { 
            background: rgba(0,0,0,0.04); 
            padding: 18px; 
            border-radius: 16px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .gem-option:active {
            transform: scale(0.98);
            background: rgba(0,0,0,0.08);
        }

        .gem-option span {
            color: var(--text-secondary);
        }

        @keyframes iosSlide {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- DIV PARA EL FONDO ANIMADO -->
<div id="particles-container"></div>

<div class="container">
    <!-- SECCIÓN LOGIN -->
    <div id="seccionLogin" class="card active">
        <h3>Identificación</h3>
        <input type="text" id="idInput" placeholder="ID de Jugador" inputmode="numeric">
        <button class="ios-button-style primary" id="btnLogin">Verificar Identidad</button>
    </div>

    <!-- SECCIÓN RECARGA -->
    <div id="seccionRecarga" class="card">
        <h3>Selecciona Pack</h3>
        <div class="gem-option" data-precio="$0.99">💎 100 <span>$0.99</span></div>
        <div class="gem-option" data-precio="$2.99">💎 310 <span>$2.99</span></div>
        <button class="ios-button-style danger" id="btnAtrasRecarga">Atrás</button>
    </div>

    <!-- SECCIÓN PAGO -->
    <div id="seccionPago" class="card">
        <h3>Pago Seguro</h3>
        <input type="text" id="refPago" placeholder="N° Referencia" inputmode="numeric">
        <h2 id="precioTotal" style="text-align:center; margin: 20px 0;"></h2>
        <button class="ios-button-style primary" id="btnFinalizar">Confirmar Pago</button>
        <button class="ios-button-style danger" id="btnCancelar">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, addDoc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCWLQaTQXt6DFHHf1S_-shcNdIaLpwXeoo",
        authDomain: "://firebaseapp.com",
        projectId: "esteban-4k",
        storageBucket: "esteban-4k.firebasestorage.app",
        messagingSenderId: "319790003304",
        appId: "1:319790003304:web:b84b2458213686b3e0b7dd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- GENERADOR DE PARTÍCULAS DINÁMICAS ---
    const crearParticulas = () => {
        const container = document.getElementById('particles-container');
        const cantidadParticulas = 25; // Cantidad balanceada para rendimiento móvil
        const colores = ['#FF69B4', '#00BFFF', '#FF1493', '#1E90FF']; // Variaciones de rosa y azul

        for (let i = 0; i < cantidadParticulas; i++) {
            const particula = document.createElement('div');
            particula.classList.add('particle');
            
            // Tamaños aleatorios entre 6px y 18px
            const tamano = Math.random() * 12 + 6;
            particula.style.width = `${tamano}px`;
            particula.style.height = `${tamano}px`;
            
            // Color e inicio aleatorio horizontal
            particula.style.background = colores[Math.floor(Math.random() * colores.length)];
            particula.style.left = `${Math.random() * 100}vw`;
            
            // Tiempos de animación desfasados para que salgan continuamente
            particula.style.animationDuration = `${Math.random() * 8 + 6}s`;
            particula.style.animationDelay = `${Math.random() * -10}s`;

            container.appendChild(particula);
        }
    };
    
    // Inicializar partículas al cargar la página
    crearParticulas();

    // --- LÓGICA DE LA APLICACIÓN ---
    const cambiarPantalla = (pantallaOcultar, pantallaMostrar) => {
        document.getElementById(pantallaOcultar).classList.remove('active');
        document.getElementById(pantallaMostrar).classList.add('active');
    };

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const idInput = document.getElementById('idInput');
        const id = idInput.value.trim();

        if (/^\d{5,12}$/.test(id)) {
            try {
                await addDoc(collection(db, "jugadores"), { id: id, fecha: new Date() });
                cambiarPantalla('seccionLogin', 'seccionRecarga');
            } catch (error) {
                alert("Error de conexión. Inténtalo de nuevo.");
            }
        } else { 
            alert("ID Inválido. Debe tener entre 5 y 12 números."); 
        }
    });

    document.querySelectorAll('.gem-option').forEach(element => {
        element.addEventListener('click', () => {
            const precio = element.getAttribute('data-precio');
            document.getElementById('precioTotal').innerText = "Total: " + precio;
            cambiarPantalla('seccionRecarga', 'seccionPago');
        });
    });

    document.getElementById('btnFinalizar').addEventListener('click', () => {
        const ref = document.getElementById('refPago').value.trim();
        if (ref.length < 5) {
            return alert("Por favor, ingresa una referencia válida (mínimo 5 caracteres).");
        }
        const mensajeWhatsApp = encodeURIComponent(`Hola, realicé un pago. Ref: ${ref}`);
        window.open(`https://wa.me{mensajeWhatsApp}`, '_blank');
    });

    document.getElementById('btnAtrasRecarga').addEventListener('click', () => cambiarPantalla('seccionRecarga', 'seccionLogin'));
