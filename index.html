<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban 4K | iOS Auth</title>
    <style>
        :root { --bg-color: #F2F2F7; --glass-bg: rgba(255, 255, 255, 0.85); --ios-blue: #007AFF; }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 25px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        #faceIdOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 100; justify-content: center; 
            align-items: center; flex-direction: column;
        }
        #lockIcon { font-size: 60px; transition: transform 0.3s; }
        
        .ios-button-style { background: rgba(0,0,0,0.05); border: none; padding: 18px; width: 100%; border-radius: 20px; color: var(--ios-blue); font-weight: 600; cursor: pointer; }
        .primary { background: var(--ios-blue); color: white; }
        input { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); padding: 18px; width: 100%; border-radius: 18px; box-sizing: border-box; }
        
        #seccionRecarga, #seccionPago { display: none; }
        .gem-option { background: rgba(0,0,0,0.03); padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<audio id="unlockSound" src="https://actions.google.com/sounds/v1/ui/unlock.ogg"></audio>

<div id="faceIdOverlay">
    <div id="lockIcon">🔒</div>
    <p style="font-weight: 600; margin-top: 10px;">Face ID</p>
</div>

<div class="container">
    <div id="seccionLogin" class="card">
        <h3>Identificación</h3>
        <input type="text" id="idInput" placeholder="ID de Jugador">
        <button class="ios-button-style primary" onclick="ejecutarVerificacion()">Verificar Identidad</button>
    </div>

    <div id="seccionRecarga" class="card">
        <h3>Selecciona Pack</h3>
        <div class="gem-option" onclick="seleccionarPack('$0.99')">💎 100 <span>$0.99</span></div>
        <div class="gem-option" onclick="seleccionarPack('$2.99')">💎 310 <span>$2.99</span></div>
    </div>

    <div id="seccionPago" class="card">
        <h3>Confirmar Pago</h3>
        <input type="text" id="refPago" placeholder="N° de Referencia">
        <h2 id="precioTotal"></h2>
        <button class="ios-button-style primary" onclick="finalizar()">Confirmar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWLQaTQXt6DFHHf1S_-shcNdIaLpwXeoo",
        authDomain: "esteban-4k.firebaseapp.com",
        projectId: "esteban-4k",
        storageBucket: "esteban-4k.firebasestorage.app",
        messagingSenderId: "319790003304",
        appId: "1:319790003304:web:b84b2458213686b3e0b7dd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hacemos las funciones globales para que los botones las vean
    window.ejecutarVerificacion = async () => {
        const id = document.getElementById('idInput').value;
        if (!/^\d{5,12}$/.test(id)) return alert("ID inválido");

        const overlay = document.getElementById('faceIdOverlay');
        const lockIcon = document.getElementById('lockIcon');
        const audio = document.getElementById('unlockSound');

        overlay.style.display = 'flex';
        
        try {
            await addDoc(collection(db, "jugadores"), { id: id, fecha: new Date() });
            
            setTimeout(() => {
                lockIcon.innerText = "🔓";
                audio.play().catch(e => console.log("Audio bloqueado por navegador"));
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('seccionLogin').style.display = 'none';
                    document.getElementById('seccionRecarga').style.display = 'block';
                }, 600);
            }, 1500);
        } catch (e) {
            alert("Error al conectar: " + e.message);
            overlay.style.display = 'none';
        }
    };

    window.seleccionarPack = (p) => {
        document.getElementById('precioTotal').innerText = "Total: " + p;
        document.getElementById('seccionRecarga').style.display = 'none';
        document.getElementById('seccionPago').style.display = 'block';
    };

    window.finalizar = () => {
        const ref = document.getElementById('refPago').value;
        if (ref.length < 5) return alert("Referencia necesaria");
        window.open(`https://wa.me/584126701585?text=Pago%20ref:%20${ref}`, '_blank');
    };
</script>
</body>
</html>
