<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteban 4K | Premium Shop</title>
    <style>
        :root { 
            --bg-body: #050505; --card-bg: #121212; 
            --neon-cyan: #00f2ff; --neon-magenta: #ff00ff; 
            --text-main: #ffffff; --accent-border: #333;
        }
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: var(--bg-body); color: var(--text-main); }
        header { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border-bottom: 4px solid var(--neon-magenta); }
        header h1 { margin: 0; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase; }
        .container { width: 95%; max-width: 500px; margin: 20px auto; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--accent-border); margin-bottom: 20px; }
        
        /* Efecto de escaneo */
        .scanning { border: 2px solid var(--neon-cyan) !important; box-shadow: 0 0 20px var(--neon-cyan) !important; transition: 0.5s; }
        
        .grid-gems { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .gem-box { background: #1a1a1a; padding: 20px 10px; text-align: center; border: 2px solid #2a2a2a; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .gem-box:hover { border-color: var(--neon-cyan); background: #222; }
        .gem-box span { display: block; font-size: 1.4em; font-weight: bold; }
        
        .btn-action { background: var(--neon-magenta); border: none; padding: 15px; width: 100%; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        input { background: #000; border: 2px solid #333; color: white; padding: 15px; width: 100%; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        #seccionRecarga, #seccionPago, #seccionFinal { display: none; }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWLQaTQXt6DFHHf1S_-shcNdIaLpwXeoo",
            authDomain: "esteban-4k.firebaseapp.com",
            projectId: "esteban-4k",
            storageBucket: "esteban-4k.firebasestorage.app",
            messagingSenderId: "319790003304",
            appId: "1:319790003304:web:b84b2458213686b3e0b7dd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.iniciarSesion = async () => {
            const idInput = document.getElementById('idInput');
            const card = document.getElementById('seccionLogin');
            const id = idInput.value;

            if (/^\d{5,12}$/.test(id)) {
                // Efecto de escaneo
                card.classList.add('scanning');
                idInput.disabled = true;
                
                await addDoc(collection(db, "jugadores"), { id: id, fecha: new Date(), estado: "iniciado" });
                
                // Espera 1.5 segundos para simular el "escaneo facial"
                setTimeout(() => {
                    document.getElementById('seccionLogin').style.display = 'none';
                    document.getElementById('seccionRecarga').style.display = 'block';
                }, 1500);
            } else { alert("ID inválido"); }
        };

        window.seleccionarPack = (precio) => {
            document.getElementById('precioTotal').innerText = "Total: US$ " + precio;
            document.getElementById('seccionRecarga').style.display = 'none';
            document.getElementById('seccionPago').style.display = 'block';
        };

        window.finalizar = () => {
            const id = document.getElementById('idInput').value;
            const paquete = document.getElementById('precioTotal').innerText;
            const refPago = document.getElementById('refPago').value;
            if (refPago.length < 5) { alert("Ingresa el N° de referencia"); return; }
            const mensaje = `Hola Esteban, acabo de pagar.%0A- ID: ${id}%0A- Pack: ${paquete}%0A- Ref: ${refPago}`;
            window.open(`https://wa.me/584126701585?text=${mensaje}`, '_blank');
            document.getElementById('seccionPago').style.display = 'none';
            document.getElementById('seccionFinal').style.display = 'block';
        };
    </script>
</head>
<body>

<header><h1>ESTEBAN 4K STORE</h1></header>

<div class="container">
    <div id="seccionLogin" class="card">
        <h3>Identificación de Jugador</h3>
        <input type="text" id="idInput" placeholder="Ingresa tu ID">
        <button class="btn-action" onclick="iniciarSesion()">Escanear ID</button>
    </div>

    <div id="seccionRecarga" class="card">
        <h3>Selecciona el Pack</h3>
        <div class="grid-gems">
            <div class="gem-box" onclick="seleccionarPack('0.99')">💎 <span>100</span> $0.99</div>
            <div class="gem-box" onclick="seleccionarPack('2.99')">💎 <span>310</span> $2.99</div>
            <div class="gem-box" onclick="seleccionarPack('4.99')">💎 <span>520</span> $4.99</div>
            <div class="gem-box" onclick="seleccionarPack('9.99')">💎 <span>1060</span> $9.99</div>
            <div class="gem-box" onclick="seleccionarPack('19.99')">💎 <span>2180</span> $19.99</div>
            <div class="gem-box" onclick="seleccionarPack('49.99')">💎 <span>5600</span> $49.99</div>
        </div>
    </div>

    <div id="seccionPago" class="card">
        <h3>Método de Pago</h3>
        <p>PayPal: <b style="color:var(--neon-cyan)">sarmientoesteban039@gmail.com</b></p>
        <input type="text" id="refPago" placeholder="N° Referencia de Pago">
        <h2 id="precioTotal" style="text-align:center; color: var(--neon-magenta)"></h2>
        <button class="btn-action" onclick="finalizar()">Confirmar Compra</button>
    </div>

    <div id="seccionFinal" class="card" style="text-align:center">
        <h2>¡Orden Enviada!</h2>
        <p>Tu pedido está en revisión.</p>
        <button class="btn-action" onclick="location.reload()">Nueva Compra</button>
    </div>
</div>

</body>
</html>
